<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পাংকু টিভি - লাইভ আইপিটিভি</title>
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }
        /* Custom Scrollbar for Channel List */
        .channel-box::-webkit-scrollbar {
            width: 8px;
        }
        .channel-box::-webkit-scrollbar-track {
            background: #1e293b;
            border-radius: 8px;
        }
        .channel-box::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 8px;
        }
        .channel-box::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
        /* Big Video Player Wrapper */
        .video-container {
            position: relative;
            padding-top: 50.25%; /* Large Aspect Ratio */
        }
        .video-js {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <header class="bg-slate-900 border-b border-slate-800 py-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <h1 class="text-3xl font-bold text-emerald-400 tracking-wider">
                💥 HASIB টিভি <span class="text-white">Pro</span>
            </h1>
            <span class="bg-red-600 text-xs font-semibold px-2.5 py-1 rounded-full animate-pulse flex items-center gap-1">
                <span class="w-2 h-2 bg-white rounded-full"></span> লাইভ
            </span>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-6 max-w-5xl">
        
        <div class="bg-black rounded-xl overflow-hidden shadow-2xl border border-slate-800 mb-4">
            <div class="video-container">
                <video id="panku-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" data-setup='{}'>
                    <p class="vjs-no-js">
                        ভিডিও দেখতে আপনার ব্রাউজারে জাভাস্ক্রিপ্ট সচল করুন।
                    </p>
                </video>
            </div>
            <div class="p-4 bg-slate-900 flex justify-between items-center border-b border-slate-800">
                <h2 id="current-channel-title" class="text-xl font-semibold text-slate-200">চ্যানেল লোড হচ্ছে...</h2>
                <span id="channel-count" class="text-sm text-slate-400 bg-slate-800 px-3 py-1 rounded-md">০টি চ্যানেল</span>
            </div>
            
            <div class="bg-slate-950 px-4 py-2 flex justify-between items-center text-xs sm:text-sm text-slate-400">
                <div class="flex items-center gap-1.5 text-amber-400 font-medium">
                    <span class="flex h-2 w-2 relative">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-amber-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-2 w-2 bg-amber-500"></span>
                    </span>
                    এখন দেখছেন: <span id="live-viewers" class="font-bold text-white">১</span> জন
                </div>
                <div class="text-slate-400">
                    মোট ভিজিটর: <span id="total-visits" class="font-bold text-emerald-400">Loading...</span> জন
                </div>
            </div>
        </div>

        <div class="mb-3 flex items-center justify-between">
            <h3 class="text-lg font-semibold text-emerald-400">📺 চ্যানেলসমূহ</h3>
            <input type="text" id="search-box" placeholder="চ্যানেল খুঁজুন..." class="bg-slate-800 border border-slate-700 text-sm rounded-lg px-3 py-1.5 text-slate-200 focus:outline-none focus:border-emerald-500 w-48 transition-all">
        </div>

        <div id="channel-list" class="channel-box grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3 max-h-[350px] overflow-y-auto p-2 bg-slate-900/50 rounded-xl border border-slate-800">
            <div class="col-span-full text-center py-8 text-slate-400 animate-pulse">মাস্টার প্লেলিস্ট প্রসেস করা হচ্ছে, দয়া করে অপেক্ষা করুন...</div>
        </div>

    </main>

    <footer class="bg-slate-950 border-t border-slate-900 py-4 text-center text-sm text-slate-500">
        <p>&copy; 2026 HASIB tv। সর্বস্বত্ব সংরক্ষিত।</p>
    </footer>

    <script src="https://vjs.zencdn.net/8.3.0/video.min.js"></script>

    <script>
        const m3uUrl = 'https://raw.githubusercontent.com/Jonypk789/Hasib-Tv/refs/heads/main/playlist.m3u8';
        let allChannels = [];
        const player = videojs('panku-player');

        // --- Visitor Counter Logic ---
        function updateCounters() {
            // 1. Total Visits Counter using a free public API
            // 'pankutv_2026' এটি আপনার সাইটের ইউনিক আইডি হিসেবে সেট করা হয়েছে
            fetch('https://api.countapi.xyz/hit/pankutv_2026/visits')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('total-visits').innerText = data.value;
                })
                .catch(() => {
                    // API কোনো কারণে ডাউন থাকলে লোকাল স্টোরেজ ব্যাকআপ হিসেবে কাজ করবে
                    let localVisits = localStorage.getItem('panku_visits') || 0;
                    localVisits = parseInt(localVisits) + 1;
                    localStorage.setItem('panku_visits', localVisits);
                    document.getElementById('total-visits').innerText = localVisits + 120; // একটু প্রো-লুক দেওয়ার জন্য বেস ভ্যালু যোগ করা
                });

            // 2. Real-time Simulated Live Viewers (বাস্তবসম্মত ওঠানামা করবে)
            function updateLiveViewers() {
                // এখানে ১২ থেকে ৩৫ জনের মধ্যে একটি র‍্যান্ডম সংখ্যা জেনারেট হবে
                const baseViewers = Math.floor(Math.random() * (35 - 12 + 1)) + 12;
                document.getElementById('live-viewers').innerText = baseViewers;
            }
            updateLiveViewers();
            setInterval(updateLiveViewers, 5000); // প্রতি ৫ সেকেন্ড পর পর লাইভ ভিউয়ারের সংখ্যা নিজে নিজেই সামান্য চেঞ্জ হবে
        }

        // Fetch and Parse M3U Playlist
        async function loadPlaylist() {
            try {
                const response = await fetch(m3uUrl);
                const data = await response.text();
                allChannels = parseM3U(data);
                
                document.getElementById('channel-count').innerText = `${allChannels.length}টি চ্যানেল`;
                
                renderChannels(allChannels);

                if(allChannels.length > 0) {
                    playChannel(allChannels[0].url, allChannels[0].name);
                }
            } catch (error) {
                console.error("Error loading playlist:", error);
                document.getElementById('channel-list').innerHTML = `<div class="col-span-full text-center py-8 text-red-400">চ্যানেল লিস্ট লোড করতে সমস্যা হয়েছে! আবার চেষ্টা করুন।</div>`;
            }
        }

        // Simple M3U Parser
        function parseM3U(data) {
            const lines = data.split('\n');
            const channels = [];
            let currentChannel = {};

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line.startsWith('#EXTINF:')) {
                    const nameMatch = line.match(/,(.+)$/);
                    currentChannel.name = nameMatch ? nameMatch[1].trim() : "Unknown Channel";
                    
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    currentChannel.logo = logoMatch ? logoMatch[1] : '';
                } else if (line.startsWith('http')) {
                    currentChannel.url = line;
                    channels.push(currentChannel);
                    currentChannel = {};
                }
            }
            return channels;
        }

        // Render Channels to Grid
        function renderChannels(channels) {
            const container = document.getElementById('channel-list');
            container.innerHTML = '';

            if(channels.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-8 text-slate-500">কোনো চ্যানেল পাওয়া যায়নি!</div>`;
                return;
            }

            channels.forEach((channel) => {
                const card = document.createElement('div');
                card.className = 'bg-slate-800/80 hover:bg-emerald-600/20 border border-slate-700/50 hover:border-emerald-500 p-3 rounded-lg cursor-pointer flex items-center gap-3 transition-all duration-200 transform hover:-translate-y-0.5 active:scale-95';
                
                const logoHtml = channel.logo ? 
                    `<img src="${channel.logo}" class="w-10 h-10 object-contain rounded bg-slate-900 p-1" onerror="this.src='https://placehold.co/40x40/1e293b/fff?text=TV'">` :
                    `<div class="w-10 h-10 rounded bg-slate-700 flex items-center justify-center font-bold text-emerald-400 text-sm">TV</div>`;

                card.innerHTML = `
                    ${logoHtml}
                    <span class="text-sm font-medium text-slate-200 truncate">${channel.name}</span>
                `;

                card.onclick = () => playChannel(channel.url, channel.name);
                container.appendChild(card);
            });
        }

        // Play Selected Channel
        function playChannel(url, name) {
            document.getElementById('current-channel-title').innerText = name;
            
            player.src({
                src: url,
                type: 'application/x-mpegURL'
            });
            
            player.ready(function() {
                player.play().catch(function(error) {
                    console.log("Auto-play dynamically blocked: ", error);
                });
            });
        }

        // Search Filter
        document.getElementById('search-box').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = allChannels.filter(channel => 
                channel.name.toLowerCase().includes(searchTerm)
            );
            renderChannels(filtered);
        });

        // Initialize Everything
        loadPlaylist();
        updateCounters();
    </script>
</body>
    </html>
