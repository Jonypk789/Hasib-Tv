<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 HASIB TV - CLAPPR FINAL 🚀</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@clappr/player@latest/dist/clappr.min.js"></script>
    
    <style>
        :root {
            --bg-color: #0b0c10; --container-bg: #1f2833; --accent-color: #66fcf1;
            --accent-gradient: linear-gradient(135deg, #66fcf1, #45a29e); --text-color: #c5c6c7;
            --card-bg: #151a21; --card-hover: #252e3b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Hind Siliguri', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 15px; }
        header { text-align: center; margin-bottom: 20px; }
        header h1 { font-size: 2.3rem; font-weight: 700; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .main-container { width: 100%; max-width: 850px; background: var(--container-bg); border-radius: 16px; padding: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
        .player-wrapper { width: 100%; border-radius: 12px; overflow: hidden; margin-bottom: 20px; aspect-ratio: 16 / 9; border: 2px solid #45a29e; background: #000; position: relative; }
        #player { width: 100%; height: 100%; }
        .search-box { width: 100%; padding: 12px 18px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background-color: var(--card-bg); color: #fff; font-size: 1rem; outline: none; margin-bottom: 20px; }
        .channels-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; max-height: 350px; overflow-y: auto; }
        .channel-card { background: var(--card-bg); border-radius: 10px; padding: 12px; text-align: center; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; min-height: 100px; justify-content: center; border: 1px solid rgba(255,255,255,0.05); }
        .channel-card:hover { background-color: var(--card-hover); transform: translateY(-2px); }
        .channel-card.active { border-color: var(--accent-color); background: rgba(102, 252, 241, 0.1); }
        .channel-icon { font-size: 1.4rem; margin-bottom: 8px; }
        .channel-title { font-weight: 600; font-size: 0.9rem; color: #fff; }
    </style>
</head>
<body>

    <header>
        <h1>🏆 HASIB TV PREMIUM 🚀</h1>
    </header>

    <div class="main-container">
        <div id="noticeBoard" style="background: #ff4a4a; color: white; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-weight: 600; text-align: center; font-size: 0.9rem; display: none;">
            ⚠️ কিছু চ্যানেল ব্ল্যাক স্ক্রিন দেখালে প্লেয়ারের পাশে আসা 'Shield' আইকন থেকে 'Allow Insecure Content' অন করুন অথবা 'CORS Unblocker' এক্সটেনশন ব্যবহার করুন।
        </div>

        <div class="player-wrapper">
            <div id="player"></div>
        </div>
        <input type="text" id="searchBox" class="search-box" placeholder="আপনার পছন্দের চ্যানেল খুঁজুন...">
        <div class="channels-grid" id="channelsGrid"></div>
    </div>

    <script>
        const channels = [
            { name: "Caze tv", url: "https://dfr80qz435crc.cloudfront.net/MNOP/Amagi/Caze/Caze_TV_BR/Caze_TV.m3u8", emoji: "🏆" },
            { name: "Somoy Tv", url: "https://live.thebosstv.com:30443/dwlive/Somoy-TV/chunks.m3u8", emoji: "📰" },
            { name: "B tv", url: "http://198.195.239.50:8095/btv/tracks-v1a1/mono.m3u8", emoji: "📺" },
            { name: "Khela play", url: "https://next.badinan.xyz/nexttv/FHD/playlist.m3u8", emoji: "⚽" },
            { name: "Toffee", url: "https://kazimmt.ami.bd/playlist/TF/TF-1.m3u8", emoji: "🔥" },
            { name: "T sports", url: "http://198.195.239.50:8095/tsports/tracks-v1a1/mono.m3u8", emoji: "🏏" },
            { name: "P tv", url: "http://198.195.239.50:8095/ptv/tracks-v1a1/mono.m3u8", emoji: "🎯" },
            { name: "Sun Direct", url: "http://198.195.239.50:8095/unt-s/video.m3u8", emoji: "☀️" },
            { name: "Willow", url: "http://27.124.71.27/Willow_Extra/index.m3u8", emoji: "🏏" },
            { name: "Btv 2", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1709/output/index.m3u8", emoji: "📡" }
        ];

        let clapprPlayer = null;

        function renderChannels(channelsToRender, activeUrl) {
            const grid = document.getElementById('channelsGrid');
            grid.innerHTML = '';
            channelsToRender.forEach((channel) => {
                const card = document.createElement('div');
                card.className = 'channel-card';
                if(activeUrl === channel.url) card.classList.add('active');
                card.innerHTML = `<div class="channel-icon">${channel.emoji}</div><div class="channel-title">${channel.name}</div>`;
                card.addEventListener('click', () => {
                    document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    playStream(channel.url);
                });
                grid.appendChild(card);
            });
        }

        function playStream(url) {
            // কোনো বাইরের সার্ভার প্রক্সি ছাড়া একদম ডিরেক্ট লিংক পাস করানো হচ্ছে
            // কারণ প্রক্সি ব্যবহার করলে লোকাল বিডিআইএক্স আইপি ডেড হয়ে যায়
            if (url.startsWith('http://')) {
                document.getElementById('noticeBoard').style.display = 'block';
            } else {
                document.getElementById('noticeBoard').style.display = 'none';
            }

            if (clapprPlayer) {
                clapprPlayer.load(url);
                clapprPlayer.play();
            } else {
                clapprPlayer = new Clappr.Player({
                    source: url,
                    parentId: "#player",
                    baseUrl: "https://cdn.jsdelivr.net/npm/@clappr/player@latest/dist",
                    autoPlay: true,
                    mute: false,
                    width: "100%",
                    height: "100%"
                });
            }
        }

        document.getElementById('searchBox').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = channels.filter(c => c.name.toLowerCase().includes(query));
            renderChannels(filtered, clapprPlayer ? clapprPlayer.options.source : '');
        });

        window.onload = function() {
            playStream(channels[0].url);
            renderChannels(channels, channels[0].url);
        };
    </script>
</body>
</html>
