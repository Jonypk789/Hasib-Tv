<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌼 HASIB TV 💕</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0e15;
            --container-bg: #161824;
            --accent-color: #ec4899;
            --accent-gradient: linear-gradient(135deg, #ec4899, #8b5cf6);
            --text-color: #f3f4f6;
            --card-bg: #202336;
            --card-hover: #2b2f4a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Hind Siliguri', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        header { text-align: center; margin-bottom: 25px; }
        header h1 { font-size: 2.5rem; font-weight: 700; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        header p { color: #9ca3af; font-size: 1rem; }
        
        /* বড় সাইজের ভিডিও প্লেয়ার কন্টেইনার (১২০০ পিক্সেল) */
        .main-container { width: 100%; max-width: 1200px; background: var(--container-bg); border-radius: 20px; padding: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        
        /* Video Player Wrapper */
        .player-wrapper { width: 100%; border-radius: 14px; overflow: hidden; background-color: #000; aspect-ratio: 16 / 9; margin-bottom: 30px; border: 2px solid rgba(139, 92, 246, 0.3); position: relative; }
        #player { width: 100%; height: 100%; }

        .search-box { width: 100%; padding: 14px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background-color: var(--card-bg); color: #fff; font-size: 1.05rem; outline: none; margin-bottom: 25px; }
        .search-box:focus { border-color: var(--accent-color); }

        .channels-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; max-height: 400px; overflow-y: auto; }
        .channel-card { background: var(--card-bg); border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 120px; }
        .channel-card:hover { background-color: var(--card-hover); transform: translateY(-3px); }
        .channel-card.active { background: var(--accent-gradient); box-shadow: 0 8px 20px rgba(236, 72, 153, 0.4); }
        .channel-icon { width: 55px; height: 55px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin-bottom: 12px; }
        .channel-title { font-weight: 600; font-size: 0.95rem; color: #fff; width: 100%; text-align: center; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis; line-height: 1.2; }
        
        .channels-grid::-webkit-scrollbar { width: 6px; }
        .channels-grid::-webkit-scrollbar-thumb { background: var(--card-bg); border-radius: 10px; }
    </style>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@clappr/player@latest/dist/clappr.min.js"></script>
</head>
<body>

    <header>
        <h1>🌼 HASIB TV 💕</h1>
        <p>🌺 পরানখালির একমাত্র Live Tv 🌺</p>
    </header>

    <div class="main-container">
        <div class="player-wrapper">
            <div id="player"></div>
        </div>

        <input type="text" id="searchBox" class="search-box" placeholder="আপনার পছন্দের চ্যানেল খুঁজুন...">

        <div class="channels-grid" id="channelsGrid"></div>
    </div>

    <script>
        // তোমার দেওয়া GitHub RAW m3u8 লিংক
        const githubRawUrl = "https://raw.githubusercontent.com/shidul100/Iptv/refs/heads/main/playlist.m3u";
        // তোমার দেওয়া Cloudflare Worker প্রক্সি লিংক (লিংকের শেষে যেন স্ল্যাশ বা কোয়েরি প্যারামিটার মানানসই হয় তা লজিকে হ্যান্ডেল করা হয়েছে)
        const proxyUrl = "https://hasibtv.jonyahmed420j.workers.dev/?url=";
        
        let channels = [];
        let playerInstance = null;

        // .m3u8 ফাইল থেকে চ্যানেলের নাম এবং লিংক পার্স করার অটোমেটিক লজিক
        function parseM3U(data) {
            const lines = data.split('\n');
            const parsedChannels = [];
            let currentName = "";
            
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                if (line.startsWith('#EXTINF:')) {
                    const nameIndex = line.lastIndexOf(',');
                    if (nameIndex !== -1) {
                        currentName = line.substring(nameIndex + 1).trim();
                    }
                } else if (line.startsWith('http://') || line.startsWith('https://')) {
                    if (currentName) {
                        parsedChannels.push({
                            name: currentName,
                            url: line,
                            emoji: "📺"
                        });
                    }
                }
            }
            return parsedChannels;
        }

        // GitHub থেকে m3u8 ফাইল লোড করার ফাংশন
        async function loadChannelsFromGitHub() {
            try {
                // ফাইল লোড করার সময়েও প্রক্সি ব্যবহার করা হয়েছে যাতে মেইন ফাইল লোডে CORS ইস্যু না হয়
                const response = await fetch(proxyUrl + encodeURIComponent(githubRawUrl));
                const fileContent = await response.text();
                channels = parseM3U(fileContent);
                
                if(channels.length > 0) {
                    playStream(channels[0].url);
                    renderChannels(channels, channels[0].url);
                } else {
                    document.getElementById('channelsGrid').innerHTML = '<div style="color:#9ca3af; padding:20px;">প্লেলিস্টে কোনো চ্যানেল পাওয়া যায়নি!</div>';
                }
            } catch (error) {
                console.error("GitHub থেকে ফাইল পড়তে সমস্যা হয়েছে:", error);
                document.getElementById('channelsGrid').innerHTML = '<div style="color:#ff4a4a; padding:20px;">চ্যানেল লিস্ট লোড করা যাচ্ছে না। প্রক্সি বা ফাইল চেক করুন।</div>';
            }
        }

        function renderChannels(channelsToRender, activeUrl) {
            const grid = document.getElementById('channelsGrid');
            grid.innerHTML = '';

            channelsToRender.forEach((channel) => {
                const card = document.createElement('div');
                card.className = 'channel-card';
                if(activeUrl === channel.url) {
                    card.classList.add('active');
                }

                card.innerHTML = `
                    <div class="channel-icon">${channel.emoji}</div>
                    <div class="channel-title">${channel.name}</div>
                `;

                card.addEventListener('click', () => {
                    document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    playStream(channel.url);
                });

                grid.appendChild(card);
            });
        }

        function playStream(url) {
            if (playerInstance) {
                playerInstance.destroy();
            }

            // আসল ভিডিও লিংকটিকে Cloudflare Worker-এর মাধ্যমে প্রক্সি ইউআরএল-এ রূপান্তর করা হলো
            const finalStreamUrl = proxyUrl + encodeURIComponent(url);

            playerInstance = new Clappr.Player({
                source: finalStreamUrl,
                parentId: "#player",
                width: '100%',
                height: '100%',
                autoPlay: true,
                mute: false,
                hlsMinimumDvrSize: 60,
                playback: {
                    playInline: true,
                    recycleVideo: true,
                    hlsjsConfig: {
                        maxBufferLength: 30,
                        enableWorker: true
                    }
                }
            });
        }

        // সার্চ বক্স ফাংশনালিটি
        document.getElementById('searchBox').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = channels.filter(c => c.name.toLowerCase().includes(query));
            const currentSrc = playerInstance ? channels.find(c => (proxyUrl + encodeURIComponent(c.url)) === playerInstance.options.source)?.url : '';
            renderChannels(filtered, currentSrc || '');
        });

        // ইনিশিয়াল রান
        loadChannelsFromGitHub();
    </script>
</body>
</html>
