<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌼 HASIB TV 💕</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0e15;
            --container-bg: #161824;
            --accent-color: #ec4899;
            --accent-gradient: linear-gradient(135deg, #ec4899, #8b5cf6);
            --text-color: #f3f4f6;
            --card-bg: #202336;
            --card-hover: #2b2f4a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Hind Siliguri', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        header { text-align: center; margin-bottom: 25px; }
        header h1 { font-size: 2.5rem; font-weight: 700; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        header p { color: #9ca3af; font-size: 1rem; }
        .main-container { width: 100%; max-width: 900px; background: var(--container-bg); border-radius: 20px; padding: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        
        /* Video Player Wrapper */
        .player-wrapper { width: 100%; border-radius: 14px; overflow: hidden; background-color: #000; aspect-ratio: 16 / 9; margin-bottom: 30px; border: 2px solid rgba(139, 92, 246, 0.3); position: relative; }
        #player { width: 100%; height: 100%; }

        .search-box { width: 100%; padding: 14px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background-color: var(--card-bg); color: #fff; font-size: 1.05rem; outline: none; margin-bottom: 25px; }
        .search-box:focus { border-color: var(--accent-color); }

        .channels-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; max-height: 400px; overflow-y: auto; }
        .channel-card { background: var(--card-bg); border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 120px; }
        .channel-card:hover { background-color: var(--card-hover); transform: translateY(-3px); }
        .channel-card.active { background: var(--accent-gradient); box-shadow: 0 8px 20px rgba(236, 72, 153, 0.4); }
        .channel-icon { width: 55px; height: 55px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin-bottom: 12px; }
        .channel-title { font-weight: 600; font-size: 0.95rem; color: #fff; width: 100%; text-align: center; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis; line-height: 1.2; }
        
        .channels-grid::-webkit-scrollbar { width: 6px; }
        .channels-grid::-webkit-scrollbar-thumb { background: var(--card-bg); border-radius: 10px; }
    </style>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@clappr/player@latest/dist/clappr.min.js"></script>
</head>
<body>

    <header>
        <h1>🌼 HASIB TV 💕</h1>
        <p>Live Streaming পরানখালী ⚽</p>
    </header>

    <div class="main-container">
        <div class="player-wrapper">
            <div id="player"></div>
        </div>

        <input type="text" id="searchBox" class="search-box" placeholder="আপনার পছন্দের চ্যানেল খুঁজুন...">

        <div class="channels-grid" id="channelsGrid"></div>
    </div>

    <script>
        // ১০টি চ্যানেলের আসল ডাটাবেজ
        const channels = [
            { name: "Caze tv", url: "https://dfr80qz435crc.cloudfront.net/MNOP/Amagi/Caze/Caze_TV_BR/Caze_TV.m3u8", emoji: "🏆" },
            { name: "Somoy Tv", url: "https://live.thebosstv.com:30443/dwlive/Somoy-TV/chunks.m3u8", emoji: "📰" },
            { name: "B tv", url: "http://198.195.239.50:8095/btv/tracks-v1a1/mono.m3u8", emoji: "📺" },
            { name: "Khela play", url: "https://next.badinan.xyz/nexttv/FHD/playlist.m3u8", emoji: "⚽" },
            { name: "Toffee", url: "https://nbculocallive.akamaized.net/hls/live/2037499/puertorico/stream1/master_1080.m3u8", emoji: "🔥" },
            { name: "T sports", url: "http://198.195.239.50:8095/tsports/tracks-v1a1/mono.m3u8", emoji: "🏏" },
            { name: "P tv", url: "http://198.195.239.50:8095/ptv/tracks-v1a1/mono.m3u8", emoji: "🎯" },
            { name: "Sun Direct", url: "http://198.195.239.50:8095/unt-s/video.m3u8", emoji: "☀️" },
            { name: "Willow", url: "http://27.124.71.27/Willow_Extra/index.m3u8", emoji: "🏏" },
            { name: "Btv 2", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1709/output/index.m3u8", emoji: "📡" }
        ];

        let playerInstance = null;

        function renderChannels(channelsToRender, activeUrl) {
            const grid = document.getElementById('channelsGrid');
            grid.innerHTML = '';

            channelsToRender.forEach((channel) => {
                const card = document.createElement('div');
                card.className = 'channel-card';
                if(activeUrl === channel.url) {
                    card.classList.add('active');
                }

                card.innerHTML = `
                    <div class="channel-icon">${channel.emoji}</div>
                    <div class="channel-title">${channel.name}</div>
                `;

                card.addEventListener('click', () => {
                    document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    playStream(channel.url);
                });

                grid.appendChild(card);
            });
        }

        function playStream(url) {
            // আগের প্লেয়ার ইনস্ট্যান্স থাকলে তা ডিলিট করা
            if (playerInstance) {
                playerInstance.destroy();
            }

            // নতুন করে Clappr প্লেয়ার সেটআপ করা, যা নেটিভভাবে CORS বাইপাস করতে পারে
            playerInstance = new Clappr.Player({
                source: url,
                parentId: "#player",
                width: '100%',
                height: '100%',
                autoPlay: true,
                mute: false,
                hlsMinimumDvrSize: 60,
                playback: {
                    playInline: true,
                    recycleVideo: true,
                    hlsjsConfig: {
                        maxBufferLength: 30,
                        enableWorker: true
                    }
                }
            });
        }

        // সার্চ বক্স ফাংশনালিটি
        document.getElementById('searchBox').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = channels.filter(c => c.name.toLowerCase().includes(query));
            const currentSrc = playerInstance ? playerInstance.options.source : '';
            renderChannels(filtered, currentSrc);
        });

        // প্রথমবার ওপেন করার সময় ইনিশিয়াল রান
        if(channels.length > 0) {
            playStream(channels[0].url);
            renderChannels(channels, channels[0].url);
        }
    </script>
</body>
</html>
